name: Update Tracker Stats

on:
  schedule:
    # Run daily at 9:00 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

jobs:
  update-youtube:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r tracker/requirements.txt

      - name: Populate new YouTube videos
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.TRACKER_YOUTUBE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python tracker/youtube/main.py

      - name: Refresh YouTube stats
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.TRACKER_YOUTUBE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python tracker/youtube/main.py --refresh-stats

  update-tiktok:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r tracker/requirements.txt

      - name: Write TikTok cookies
        run: |
          printf '%s\n' "${{ secrets.TIKTOK_COOKIES }}" > tracker/tiktok/cookies.txt
          # Strip a possible UTF-8 BOM and CR line endings the secret may carry.
          sed -i '1s/^\xEF\xBB\xBF//; s/\r$//' tracker/tiktok/cookies.txt
          # Fail loudly if it's not a Netscape cookie jar (otherwise every fetch
          # silently 403s and the run still "succeeds" with 0 updates).
          head -n1 tracker/tiktok/cookies.txt | grep -q 'HTTP Cookie File' || {
            echo "::error::TIKTOK_COOKIES secret is not a Netscape-format cookies file (missing magic header line)."; exit 1; }

      - name: Populate new TikTok videos
        env:
          SOCIAL_SHEET_ID: ${{ secrets.TRACKER_SOCIAL_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python tracker/tiktok/main.py --cookies tracker/tiktok/cookies.txt

      - name: Refresh TikTok stats
        env:
          SOCIAL_SHEET_ID: ${{ secrets.TRACKER_SOCIAL_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python tracker/tiktok/main.py --refresh-stats --cookies tracker/tiktok/cookies.txt

  update-instagram:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r tracker/requirements.txt

      - name: Write Instagram cookies
        run: |
          printf '%s\n' "${{ secrets.INSTAGRAM_COOKIES }}" > tracker/instagram/cookies.txt
          # Strip a possible UTF-8 BOM and CR line endings the secret may carry.
          sed -i '1s/^\xEF\xBB\xBF//; s/\r$//' tracker/instagram/cookies.txt
          # Fail loudly if it's not a Netscape cookie jar (otherwise every fetch
          # silently 403s and the run still "succeeds" with 0 updates).
          head -n1 tracker/instagram/cookies.txt | grep -q 'HTTP Cookie File' || {
            echo "::error::INSTAGRAM_COOKIES secret is not a Netscape-format cookies file (missing magic header line)."; exit 1; }

      - name: Populate new Instagram videos
        env:
          SOCIAL_SHEET_ID: ${{ secrets.TRACKER_SOCIAL_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python tracker/instagram/main.py --cookies tracker/instagram/cookies.txt

      - name: Refresh Instagram stats
        env:
          SOCIAL_SHEET_ID: ${{ secrets.TRACKER_SOCIAL_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python tracker/instagram/main.py --refresh-stats --cookies tracker/instagram/cookies.txt
