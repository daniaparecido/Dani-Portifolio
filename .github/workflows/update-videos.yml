name: Update Video Stats

on:
  # Run daily at 9:00 AM UTC
  schedule:
    - cron: '0 9 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Write Instagram cookies
        env:
          INSTAGRAM_COOKIES: ${{ secrets.INSTAGRAM_COOKIES }}
        run: |
          if [ -n "$INSTAGRAM_COOKIES" ]; then
            # Strip UTF-8 BOM if present. yt-dlp rejects Netscape cookie files starting with one;
            # the BOM can sneak in when uploading the secret from PowerShell.
            printf '%s' "$INSTAGRAM_COOKIES" | sed $'1s/^\xef\xbb\xbf//' > cookies.txt
            echo "Wrote $(wc -c < cookies.txt) bytes to cookies.txt"
          else
            echo "INSTAGRAM_COOKIES secret is empty; Instagram refreshes will fail."
          fi

      - name: Refresh video stats
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          COOKIES_FILE: cookies.txt
        run: |
          python scripts/sync_from_sheet.py --refresh

      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet js/projects.js || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push changes
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add js/projects.js
          git commit -m "Update video stats [automated]"
          git push

