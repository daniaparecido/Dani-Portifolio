<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Daniel Aparecido - Video Editor and Motion Designer. Portfolio showcasing long-form, short-form, and motion design work.">
    <meta name="keywords" content="video editor, motion designer, video production, content creator">
    <title>Daniel Aparecido | Video Editor & Motion Designer</title>
    <link rel="icon" type="image/png" href="images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css?v=10">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="logo-link">
                <img src="images/logo.png" alt="Daniel Aparecido Logo" class="logo">
            </a>
            <div class="header-text">
                <h1 class="site-title">Daniel Aparecido</h1>
                <p class="site-subtitle">Video Editor and Motion Designer</p>
            </div>
            <div class="header-contact">
                <a href="mailto:daniaparecidocontato@gmail.com" class="header-cta">
                    daniaparecidocontato@gmail.com
                </a>
                <button class="copy-email-btn" id="copy-email-btn" data-email="daniaparecidocontato@gmail.com" aria-label="Copy email to clipboard">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                </button>
            </div>
        </div>
    </header>

    <div class="hero-stat" id="view-counter">
        <div class="hero-stat-links">
            <div class="header-socials">
                <a href="https://instagram.com/daniaparecido" target="_blank" rel="noopener noreferrer" class="header-social-icon" aria-label="Instagram">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
                </a>
                <a href="https://x.com/daniaparecido_" target="_blank" rel="noopener noreferrer" class="header-social-icon" aria-label="X (Twitter)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                </a>
            </div>
            <div class="video-list-dropdown">
                <button class="hero-stat-link video-list-toggle" id="video-list-toggle">
                    All-time Video Stats
                    <svg class="chevron-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                </button>
                <div class="video-list-menu" id="video-list-menu">
                    <a href="https://docs.google.com/spreadsheets/d/157LkGyuY_jMWwTWKu2w4Sh9lw0qHCURXKUufFfgOgqg/edit?usp=sharing" target="_blank" rel="noopener noreferrer" class="video-list-item">
                        YouTube
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                    </a>
                    <a href="https://docs.google.com/spreadsheets/d/1jVd2XMhOI1MVqV9YtaBMVtXWU7IzkdZNuLYdkI5ZKdQ/edit?gid=0#gid=0" target="_blank" rel="noopener noreferrer" class="video-list-item">
                        Socials
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <nav class="mobile-tabs" id="mobile-tabs">
        <button class="mobile-tab active" data-tab="long-form">Long-form</button>
        <button class="mobile-tab" data-tab="short-form">Short-form</button>
    </nav>

    <main class="main">
        <section class="section" id="section-long-form">
            <h2 class="section-title">Long-form</h2>
            <div class="grid" id="long-form-grid"></div>
        </section>

        <section class="section" id="section-short-form">
            <h2 class="section-title">Short-form</h2>
            <div class="grid" id="short-form-grid"></div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <a href="mailto:daniaparecidocontato@gmail.com" class="footer-link">daniaparecidocontato@gmail.com</a>
            <span class="footer-divider">|</span>
            <a href="https://instagram.com/daniaparecido" target="_blank" rel="noopener noreferrer" class="footer-link">@daniaparecido</a>
        </div>
    </footer>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightbox-close" aria-label="Close video">&times;</button>
        <div class="lightbox-content">
            <div class="video-container" id="video-container">
                <!-- YouTube iframe will be inserted here -->
            </div>
        </div>
    </div>

    <script src="js/projects.js?v=10"></script>
    <script src="js/main.js?v=10"></script>
</body>
</html>
